    <!-- HEADLINE -->
    <div style="position:absolute; left:0px; top:150px; width:1480px; text-align:center; font-family:'Newsreader',serif; font-weight:400; font-size:92px; line-height:1.03; letter-spacing:-1.6px; color:#14110d; text-wrap:balance;">A verifiable guardian<br>for every asset</div>

    <div style="position:absolute; left:0px; top:440px; width:1480px; text-align:center; display:flex; gap:14px; align-items:center; justify-content:center;">

        <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><circle cx="3" cy="3" r="1.7" fill="currentColor"></circle><circle cx="8.5" cy="3" r="1.7" fill="currentColor" opacity="0.5"></circle><circle cx="3" cy="8.5" r="1.7" fill="currentColor" opacity="0.5"></circle><circle cx="8.5" cy="8.5" r="1.7" fill="currentColor"></circle><circle cx="14" cy="8.5" r="1.7" fill="currentColor" opacity="0.5"></circle><circle cx="8.5" cy="14" r="1.7" fill="currentColor" opacity="0.5"></circle></svg>
        See it reason

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1600,&quot;height&quot;:1160},&quot;waveHue&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;min&quot;:-50,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;},&quot;showStack&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;ctaColor&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Black&quot;,&quot;options&quot;:[&quot;Black&quot;,&quot;Gold&quot;,&quot;Blue&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  componentDidMount(){
    this._t0 = performance.now();
    this.draw(0);
    const loop = (t)=>{ this.draw(t - this._t0); this._raf = requestAnimationFrame(loop); };
    this._raf = requestAnimationFrame(loop);
    // fallback tick (covers backgrounded rAF throttling)
    this._iv = setInterval(()=>{ this.draw(performance.now() - this._t0); }, 90);
  }
  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); if(this._iv) clearInterval(this._iv); }
  draw(elapsed){
    const cv = this._cv; if(!cv) return;
    const ctx = cv.getContext('2d'); const W = cv.width, H = cv.height;
    ctx.clearRect(0,0,W,H);
    const TAU = Math.PI*2; const ph = elapsed*0.00020;
    const N = 150; const X=[],TOP=[],BOT=[],CY=[],TH=[];
    const ss=(a,b,x)=>{x=Math.max(0,Math.min(1,(x-a)/(b-a)));return x*x*(3-2*x);};
    for(let i=0;i<=N;i++){
      const u=i/N, x=u*W, ang=u*TAU*2.15+ph;
      const cy=H*0.50 + H*0.205*Math.sin(ang+0.4) + H*0.065*Math.sin(ang*2.0+1.1+ph*1.25);
      let th=H*(0.155 + 0.105*(0.5+0.5*Math.cos(ang+0.9)));
      th*=ss(0,0.04,u)*ss(0,0.04,1-u);
      X[i]=x; CY[i]=cy; TH[i]=th; TOP[i]=cy-th/2; BOT[i]=cy+th/2;
    }
    const band=(tf,bf)=>{ ctx.beginPath(); ctx.moveTo(X[0],tf(0));
      for(let i=1;i<=N;i++) ctx.lineTo(X[i],tf(i));
      for(let i=N;i>=0;i--) ctx.lineTo(X[i],bf(i)); ctx.closePath(); };
    const gz=(u,c,w)=>{const d=Math.min(Math.abs(u-c),Math.abs(u-c-1),Math.abs(u-c+1));return Math.exp(-(d*d)/(w*w));};
    const gold=[247,200,96], blue=[86,158,244];
    const g=ctx.createLinearGradient(0,0,W,0);
    const c1=((0.30+ph*0.05)%1+1)%1, c2=((0.62+ph*0.05)%1+1)%1;
    for(let s=0;s<=30;s++){ const u=s/30;
      const b=Math.min(1, 0.95*gz(u,c1,0.06)+0.9*gz(u,c2,0.055));
      const c=[gold[0]+(blue[0]-gold[0])*b, gold[1]+(blue[1]-gold[1])*b, gold[2]+(blue[2]-gold[2])*b];
      g.addColorStop(u, `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`);
    }
    ctx.save(); ctx.filter='blur(2.5px)'; band(i=>TOP[i], i=>BOT[i]); ctx.fillStyle=g; ctx.fill(); ctx.restore();
    ctx.save(); ctx.filter='blur(7px)'; ctx.globalAlpha=0.55; band(i=>CY[i]-TH[i]*0.30, i=>CY[i]+TH[i]*0.04); ctx.fillStyle='rgb(255,253,247)'; ctx.fill(); ctx.restore();
    ctx.save(); ctx.filter='blur(9px)'; ctx.globalAlpha=0.20; band(i=>CY[i]+TH[i]*0.18, i=>BOT[i]+2); ctx.fillStyle='rgb(206,150,40)'; ctx.fill(); ctx.restore();
  }
  renderVals(){
    const h = this.props.waveHue ?? 0;
    const cta = this.props.ctaColor ?? 'Black';
    const ctaMap = {
      Black: ['#15120e', '#ffffff'],
      Gold:  ['#e7a83c', '#1c1206'],
      Blue:  ['#2f7fe0', '#ffffff'],
    };
    const [ctaBg, ctaText] = ctaMap[cta] || ctaMap.Black;
    return {
      noop: () => {},
      canvasRef: (el)=>{ this._cv = el; },
      waveFilter: h ? `hue-rotate(${h}deg) saturate(1.05)` : 'none',
      stackDisplay: (this.props.showStack ?? true) ? 'flex' : 'none',
      ctaBg, ctaText,
    };
  }
}
</script>
</body>
