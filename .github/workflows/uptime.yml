# Uptime + health monitoring.
#
# Pings the live /api/health endpoint (which itself exercises the on-chain reads the product
# depends on — vault, reserves solvency, quorum, policy engine), so a green run means the
# CHAIN-backed features actually work, not just that the web server responds. Fails the run
# (and notifies via GitHub) if the site is down or degraded.
name: uptime

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {}

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health
        run: |
          set -e
          URL="${HEALTH_URL:-https://amanah-casper-rwa.vercel.app/api/health}"
          echo "GET $URL"
          body=$(curl -sS -w "\n%{http_code}" --max-time 30 "$URL")
          code=$(echo "$body" | tail -1)
          json=$(echo "$body" | sed '$d')
          echo "$json"
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::health endpoint returned $code (degraded or down)"
            exit 1
          fi
          echo "$json" | grep -q '"status":"ok"' || { echo "::error::status is not ok"; exit 1; }
      - name: Check the landing page renders
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "https://amanah-casper-rwa.vercel.app/")
          echo "landing HTTP $code"
          [ "$code" = "200" ] || { echo "::error::landing returned $code"; exit 1; }
