[[contracts]]
fqn = "amanah_contracts::rwa_vault::RwaVault"

[[contracts]]
fqn = "amanah_contracts::attestation_log::AttestationLog"

[[contracts]]
fqn = "amanah_contracts::spend_gate::SpendGate"

# ComplianceRegistry is the one contract we expect to upgrade in place (rule
# changes). On Casper 2.0 / Odra 2.8 contracts are deployed as managed packages
# and are upgradable by default; the legacy `odra_cfg_is_upgradable` per-contract
# key from older Odra is kept here as an explicit marker of intent.
# ponytail: verify against odra 2.8 — the 2.8 Odra.toml in the odra repo only
# documents `fqn`; this key may be ignored by cargo-odra 2.8 (harmless if so).
[[contracts]]
fqn = "amanah_contracts::compliance_registry::ComplianceRegistry"
odra_cfg_is_upgradable = true

[[contracts]]
fqn = "amanah_contracts::reputation_registry::ReputationRegistry"

# x402 payment asset: local CEP-18 wrapper (SubModule<odra_modules Cep18>). Must be
# a contract defined in THIS crate — an external odra_modules fqn only builds the
# intermediate builder wasm (no `call` export). init(symbol,name,decimals,initial_supply).
[[contracts]]
fqn = "amanah_contracts::payment_token::PaymentToken"

# ZkKycVerifier: on-chain Schnorr NIZK verification (real ZK KYC).
[[contracts]]
fqn = "amanah_contracts::zk_kyc::ZkKycVerifier"

# AuditorQuorum: K-of-N independent auditors must approve on-chain.
[[contracts]]
fqn = "amanah_contracts::auditor_quorum::AuditorQuorum"

# ZkReserves: on-chain ZK proof-of-reserves (Pedersen + Schnorr, hides the split).
[[contracts]]
fqn = "amanah_contracts::zk_reserves::ZkReserves"

# PolicyEngine: the agent's trading policy as on-chain, owner-gated, versioned parameters.
[[contracts]]
fqn = "amanah_contracts::policy_engine::PolicyEngine"

# GovernanceTimelock: queued, time-delayed governance over the PolicyEngine (B4).
[[contracts]]
fqn = "amanah_contracts::governance_timelock::GovernanceTimelock"
